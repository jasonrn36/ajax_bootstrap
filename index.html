<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Library to bootstrap-->
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
        <!--Library to bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Olá Mundo</title>
</head>
<body>
    <div class="container">
            <form>
                <div class="row mt-5">
                    <h4>Dados básicos</h4>
                </div>

                    <div class="row">
                        <div class="col-3">
                            <input type="text" class="form-control" placeholder="Nome"/>
                        </div>
                        <div class="col-5" >
                            <input type="text" class="form-control" placeholder="Sobrenome"/>
                        </div>
                        <div class="col-4" >
                            <input type="mail" class="form-control" placeholder="Email"/>
                        </div>
                        <div class="row mt-3" >
                            <h4>Dados da entrega</h4>

                        </div>
                        <div class="row mb-5">
                            <div class="col-3 d-flex" >
                                <input type="text" class="form-control me-2" placeholder="CEP" id="cep"/>
                                <button id="btn-buscar-cep" type="button" class="btn btn-primary">
                                    <i class="bi bi-search"></i>
                                    <span class="d-none spinner-border spinner-border-sm"></span>
                                </button>
                            </div>
                            <div  class="col-7" >
                                <input type="text" class="form-control" placeholder="Endereço" id="endereco"/>
                            </div>
                            <div class="col-2" >
                                <input type="number" class="form-control" placeholder="Número"/>
                            </div>

                        </div><!--End to Formulary-->
                        <button type="submit" class="btn btn-success"><!--Start to button form-->
                            Enviar
                        </button>
                    </div>
            </form>
    </div>



    <script src="jquery.js"></script>
    <script src="main.js"></script>
    <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
